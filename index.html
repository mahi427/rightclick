<!DOCTYPE html>

  <head>

    <title>Right Click Institute - Excellence in Mathematics</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom Tailwind Configuration -->
    <script>
      tailwind.config = {

              'fade-in-up': 'fadeInUp 0.8s ease-out',
              'scale-in': 'scaleIn 0.6s ease-out',

              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              bounceSoft: {

                '50%': { transform: 'translateY(-10px)' },
              },
              wave: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-100%)' },
              },
              shimmer: {

                '100%': { backgroundPosition: '200% center' },
              },
              countUp: {
                'from': { transform: 'scale(0.5)', opacity: 0 },
                'to': { transform: 'scale(1)', opacity: 1 },
              },
              equationSolve: {
                '0%': { width: '0%' },
                '100%': { width: '100%' },
              },
              geometricRotate: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              },
              particleFloat: {
                '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                '25%': { transform: 'translate(20px, -20px) rotate(90deg)' },
                '50%': { transform: 'translate(0, -40px) rotate(180deg)' },
                '75%': { transform: 'translate(-20px, -20px) rotate(270deg)' },
                '100%': { transform: 'translate(0, 0) rotate(360deg)' },
              },
              slideInLeft: {
                'from': { transform: 'translateX(-100px)', opacity: 0 },
                'to': { transform: 'translateX(0)', opacity: 1 },
              },
              slideInRight: {
                'from': { transform: 'translateX(100px)', opacity: 0 },
                'to': { transform: 'translateX(0)', opacity: 1 },
              },
              fadeInUp: {
                'from': { transform: 'translateY(50px)', opacity: 0 },
                'to': { transform: 'translateY(0)', opacity: 1 },
              },
              scaleIn: {
                'from': { transform: 'scale(0.8)', opacity: 0 },
                'to': { transform: 'scale(1)', opacity: 1 },
              },
            },
            backgroundImage: {
              'math-pattern': "url(\"data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%233b82f6' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E\")",
              'equation-pattern': "url(\"data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='30' font-family='monospace' font-size='14' fill='%233b82f6' opacity='0.1'%3Ex² + y² = r²%3C/text%3E%3Ctext x='120' y='60' font-family='monospace' font-size='14' fill='%23dc2626' opacity='0.1'%3Eπr²%3C/text%3E%3Ctext x='40' y='100' font-family='monospace' font-size='14' fill='%2310b981' opacity='0.1'%3Ea² + b² = c²%3C/text%3E%3Ctext x='140' y='130' font-family='monospace' font-size='14' fill='%23f59e0b' opacity='0.1'%3Ee=mc²%3C/text%3E%3C/svg%3E\")",
            }
          }
        }
      }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
      * {
        font-family: 'Inter', sans-serif;
      }
      
      .mono-font {
        font-family: 'JetBrains Mono', monospace;
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(45deg, #3b82f6, #dc2626);
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(45deg, #1e40af, #b91c1c);
      }
      
      /* Parallax Layers */
      .parallax-layer {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: -1;
        pointer-events: none;
      }
      
      /* Math Equation Text */
      .math-text {
        background: linear-gradient(45deg, #3b82f6, #dc2626, #f59e0b, #10b981);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        background-size: 300% 300%;
        animation: gradientShift 8s ease infinite;
      }
      
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      /* Glowing Elements */
      .glow {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      }
      
      .glow-red {
        box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
      }
      
      .glow-yellow {
        box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
      }
      
      /* Floating Equations */
      .floating-equation {
        position: absolute;
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        opacity: 0.1;
        z-index: -1;
        pointer-events: none;
      }
      
      /* 3D Card Effect */
      .card-3d {
        transform-style: preserve-3d;
        perspective: 1000px;
      }
      
      .card-3d:hover {
        transform: rotateY(5deg) rotateX(5deg);
      }
      
      /* Particle System */
      .particle {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
      }
      
      /* Loading Animation */
      .math-loader {
        width: 50px;
        height: 50px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #3b82f6;
        border-right: 3px solid #dc2626;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body class="bg-gradient-to-b from-gray-50 via-white to-blue-50 overflow-x-hidden">
    <!-- Parallax Background Layers -->
    <div class="parallax-layer" style="z-index: -3;">
      <div class="absolute inset-0 bg-math-pattern opacity-5"></div>
    </div>
    
    <div class="parallax-layer" style="z-index: -2;">
      <div class="absolute inset-0 bg-equation-pattern opacity-3"></div>
    </div>
    
    <!-- Floating Equations -->
    <div class="floating-equation" style="top: 10%; left: 5%;">x² + y² = r²</div>
    <div class="floating-equation" style="top: 20%; right: 10%;">πr²</div>
    <div class="floating-equation" style="bottom: 30%; left: 15%;">a² + b² = c²</div>
    <div class="floating-equation" style="bottom: 20%; right: 5%;">e=mc²</div>
    <div class="floating-equation" style="top: 40%; left: 20%;">∫f(x)dx</div>
    <div class="floating-equation" style="top: 60%; right: 20%;">∑x/n</div>
    
    <div id="root"></div>
    
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 1000,
        once: true,
        offset: 100,
        delay: 100
      });
    </script>
    
    <!-- Parallax Script -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Create floating particles
        createParticles(30);
        
        // Parallax effect
        window.addEventListener('scroll', function() {
          const scrolled = window.pageYOffset;
          const parallaxLayers = document.querySelectorAll('.parallax-layer');
          
          parallaxLayers.forEach((layer, index) => {
            const speed = 0.3 + (index * 0.1);
            const yPos = -(scrolled * speed);
            layer.style.transform = `translateY(${yPos}px)`;
          });
        });
      });
      
      function createParticles(count) {
        const colors = ['#3b82f6', '#dc2626', '#f59e0b', '#10b981', '#8b5cf6'];
        for (let i = 0; i < count; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          const size = Math.random() * 15 + 5;
          const color = colors[Math.floor(Math.random() * colors.length)];
          
          particle.style.width = `${size}px`;
          particle.style.height = `${size}px`;
          particle.style.left = `${Math.random() * 100}vw`;
          particle.style.top = `${Math.random() * 100}vh`;
          particle.style.background = `radial-gradient(circle, ${color}40, ${color}20)`;
          particle.style.filter = 'blur(2px)';
          
          // Random animation
          const duration = Math.random() * 20 + 10;
          particle.style.animation = `particle-float ${duration}s linear infinite`;
          
          document.body.appendChild(particle);
        }
      }
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
